<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Tracking</title>
  <link rel="stylesheet" href="fitness.css">
</head>
<body>
  <div id="app">

    <header>
      <span id="header-date" class="header-date"></span>
      <button id="btn-add-workout" class="btn-primary">+ Add Workout</button>
    </header>

    <main>
      <h1 class="page-title">Workout Tracking</h1>
      <div id="workout-history"></div>
    </main>

    <!-- Add Workout Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-dialog" role="dialog" aria-modal="true">

        <div class="modal-header">
          <h2 class="modal-title">Add Workout</h2>
          <button id="btn-modal-close" class="btn-icon-close" aria-label="Close">✕</button>
        </div>

        <div class="modal-body">

          <div class="form-group">
            <label class="field-label">Date</label>
            <div class="date-input-wrap">
              <input type="text" id="modal-date-text" class="date-text-input"
                     placeholder="DD-MM-YYYY" maxlength="10" autocomplete="off">
              <button id="btn-calendar-icon" class="btn-cal-icon" title="Pick date" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
              </button>
              <input type="date" id="modal-date-picker" class="hidden-picker" tabindex="-1">
            </div>
            <span class="field-error" id="date-error"></span>
          </div>

          <div class="form-group">
            <label class="field-label">Exercises</label>
            <div id="modal-exercises"></div>
            <button id="btn-add-exercise" class="btn-add-exercise" type="button">+ Add Exercise</button>
          </div>

        </div>

        <div class="modal-footer">
          <button id="btn-modal-cancel" class="btn-ghost">Cancel</button>
          <button id="btn-save-workout" class="btn-primary">Save Workout</button>
        </div>

      </div>
    </div>

  </div>
  <script src="fitness.js"></script>
</body>
</html>
